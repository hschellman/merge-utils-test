name: Sphinx build

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout 
      # uses: actions/checkout@v4 SHA for 4.3.1 below
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
    - name: Update python
      #uses: actions/setup-python@v5 moved to 5.6.0
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
      with:
        python-version: '3.9' 
    - name: whereami
      run: pwd
    - name: directory structure
      run: ls -lR
    - name: Install Dependencies (the build file seems to overwrite this
      run: python3 -m pip install -r docs/requirements.txt 
      shell: bash
    - name: check env 
      run: env
    - name: directly build sphinx
      run: |
        pip install -r docs/requirements.txt
        pip install logging
        pip install .
        cd docs
        make html
        cd ..
   #- name: install myself
   #   run: |
   #     pip install .  
    - name: check env again
      run: env
    - name: Upload artifacts
      # uses: actions/upload-artifact@v4 SHA for 4.6.2
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: html-docs
        path: docs/build/html/
    - name: Deploy
      #uses: peaceiris/actions-gh-pages@v3
      #uses: JamesIves/github-pages-deploy-action@v4
      uses: JamesIves/github-pages-deploy-action@9d877eea73427180ae43cf98e8914934fe157a1a
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: docs/build/html
